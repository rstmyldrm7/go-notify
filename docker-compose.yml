# One-command setup: docker compose up --build
#
# Infrastructure (kafka, postgres) plus the three application services. The api
# applies migrations on startup, so no separate migrate step is needed. Set
# PROVIDER_URL in .env to your webhook.site URL before starting the worker.
services:
  kafka:
    image: apache/kafka:3.9.1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # INTERNAL for other compose services, EXTERNAL for the host machine.
      KAFKA_LISTENERS: INTERNAL://:19092,CONTROLLER://:9093,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:19092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 12

  # One-shot: creates the priority topics deterministically instead of
  # relying on auto-creation during the first produce.
  kafka-init:
    image: apache/kafka:3.9.1
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        for topic in
        sms.high sms.normal sms.low sms.dlq
        email.high email.normal email.low email.dlq
        push.high push.normal push.low push.dlq; do
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092
        --create --if-not-exists --topic $$topic --partitions 3 --replication-factor 1;
        done
    restart: "no"

  # Web UI for inspecting topics, messages, headers and consumer group lag.
  # http://localhost:8090
  kafka-console:
    image: docker.redpanda.com/redpandadata/console:latest
    ports:
      - "8090:8080"
    environment:
      KAFKA_BROKERS: kafka:19092
    depends_on:
      kafka:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: notify
      POSTGRES_PASSWORD: notify
      POSTGRES_DB: notify
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notify -d notify"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: build/Dockerfile
      args:
        SERVICE: api
    ports:
      - "8080:8080"
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: "postgres://notify:notify@postgres:5432/notify?sslmode=disable"
      KAFKA_BROKERS: "kafka:19092"
      APP_ENV: "production"
      MIGRATE_ON_START: "true"
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: build/Dockerfile
      args:
        SERVICE: worker
    ports:
      - "9100:9100" # Prometheus /metrics and /healthz
    environment:
      DATABASE_URL: "postgres://notify:notify@postgres:5432/notify?sslmode=disable"
      KAFKA_BROKERS: "kafka:19092"
      APP_ENV: "production"
      METRICS_ADDR: ":9100"
      # Your webhook.site URL — required. Set PROVIDER_URL in .env.
      PROVIDER_URL: "${PROVIDER_URL}"
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  scheduler:
    build:
      context: .
      dockerfile: build/Dockerfile
      args:
        SERVICE: scheduler
    environment:
      DATABASE_URL: "postgres://notify:notify@postgres:5432/notify?sslmode=disable"
      KAFKA_BROKERS: "kafka:19092"
      APP_ENV: "production"
      SCHEDULER_INTERVAL: "5s"
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

volumes:
  pgdata:
