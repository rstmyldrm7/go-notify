apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    jsonData:
      # Show a service dependency graph built from span relationships.
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
      # From a span, jump to the matching Prometheus series for that service.
      tracesToMetrics:
        datasourceUid: prometheus
        tags:
          - key: service.name
            value: service
