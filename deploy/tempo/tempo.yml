# Single-binary Tempo for local development. It ingests spans over OTLP/gRPC
# straight from the services (no separate collector) and stores trace blocks on
# a local volume. Grafana queries it over HTTP on :3200.
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  # Flush blocks quickly so traces become queryable within seconds — fine for a
  # dev box, far too aggressive for production.
  max_block_duration: 5m

compactor:
  compaction:
    # Local dev keeps only a short history; trims disk usage.
    block_retention: 1h

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

# Disable the anonymous usage report for a local stack.
usage_report:
  reporting_enabled: false
